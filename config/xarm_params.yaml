shape_tracer_node:
  ros__parameters:
    plane_origin: [0.3, 0.0, 0.2]  # x, y, z in meters
    plane_normal: [0.0, 0.0, 1.0]   # Horizontal plane
    scale: 1.0                       # Scale factor for shapes
    resolution: 0.005                 # 5mm resolution
    approach_height: 0.1              # 10cm approach height

trajectory_planner:
  ros__parameters:
    planning_time: 5.0                # seconds
    goal_tolerance: 0.01               # meters/radians
    joint_speed: 0.5                   # rad/s
    max_acceleration: 0.5               # rad/s^2